window.Claira.generateAIInsight = async function generateAIInsight(answers) {
  const fallback = { ...window.Claira.getInsight(answers), summary: null };
  const key = window.__GROQ_KEY;
  if (!key) return fallback;

  const labels = { emotion:'Émotion', duration:'Durée', impact:'Impact quotidien', goal:'Objectif', constraint:'Contraintes', style:'Style de thérapeute' };

  // Identifie si une réponse est un chip prédéfini ou une saisie libre
  const predefined = window.Claira.QUESTIONS.reduce((acc, q) => {
    acc[q.id] = q.options.map(o => o.l);
    return acc;
  }, {});
  const answersText = Object.entries(answers).map(([k, v]) => {
    const isChip = predefined[k] && predefined[k].includes(v);
    const tag = isChip ? '[étiquette]' : '[saisie libre]';
    return `- ${labels[k] || k} (${tag}) : ${v}`;
  }).join('\n');

  const prompt = `Tu es un psychologue clinicien qui rédige une synthèse sobre et précise pour un patient. Voici ses réponses à un questionnaire :\n${answersText}\n\nTon objectif : écrire une synthèse qui sonne comme un texte rédigé par un humain, pas comme un formulaire rempli. Ne recopie JAMAIS les étiquettes mot pour mot. Transforme-les en langage naturel.\n\nEXEMPLE de ce qu'il NE FAUT PAS faire :\n{"summary": "vous vous sentez Débordé·e depuis Quelques semaines et cela se répercute sur votre quotidien"}\n\nEXEMPLE de ce qu'il FAUT faire :\n{"summary": "Vous traversez une période de **surcharge et de tension** qui s'est installée progressivement. Ce que vous portez **déborde sur votre quotidien**, rendant difficile de souffler vraiment. Vous cherchez avant tout à **retrouver un espace pour vous poser**."}\n\nRéponds UNIQUEMENT avec ce JSON valide :\n{"label":"...","summary":"...","text":"...","process":"..."}\n\nRègles :\n- label : 5-8 mots, factuel, sans "vous", sans promesse\n- summary : 2-3 phrases fluides en "vous", ton clinique et humain. Entoure 2-3 expressions clés de **double astérisques**. Aucune étiquette brute.\n- text : 2-3 phrases sur les mécanismes psychologiques, nuancé\n- process : 2-3 phrases concrètes sur l'apport de la thérapie\n\nInterdit absolu : "je", "nous", "Claira", "vous n'êtes pas seul·e", "je suis là".`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`,
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 600,
        temperature: 0.7,
      })
    });
    if (!res.ok) return fallback;
    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) return fallback;
    const parsed = JSON.parse(jsonMatch[0]);
    const isPersonified = (value) => /je\s+(te|vous|suis|comprends|soutiens)|Claira/i.test(String(value || ""));
    return {
      label:   parsed.label && !isPersonified(parsed.label) ? parsed.label : fallback.label,
      summary: parsed.summary || null,
      text:    parsed.text && !isPersonified(parsed.text) ? parsed.text : fallback.text,
      process: parsed.process && !isPersonified(parsed.process) ? parsed.process : fallback.process,
      therapy: fallback.therapy,
    };
  } catch (e) {
    return fallback;
  }
};

(() => {
  const { useState, useEffect, useRef, useMemo, useCallback } = React;

  const THREE_BACKGROUND_SETTINGS = {
    dpr: 1.0,
    timeScale: 0.5,
    waveSpeed: 1.0,
    waveHeight: 1.0,
    wave1Freq: 4.8,
    wave1Amp: 0.038,
    wave2Freq: 0.3,
    wave2Amp: -0.09,
    wave3FreqX: -0.6,
    wave3FreqZ: -0.7,
    wave3Amp: 0.12,
    noiseAmount: 0.004,
    foldingOffset: 9.291,
    stepBase: 0.146,
    glowIntensity: 0.0085,
    glowSpread: 5.1,
  };

  const THREE_VERTEX_SHADER = `
    void main() {
      gl_Position = vec4(position, 1.0);
    }
  `;

  const THREE_FRAGMENT_SHADER = `
    precision highp float;
    uniform vec3 iResolution;
    uniform float iTime;
    uniform float uTimeScale;
    uniform float uWaveSpeed;
    uniform float uWaveHeight;
    uniform float uWave1Freq;
    uniform float uWave1Amp;
    uniform float uWave2Freq;
    uniform float uWave2Amp;
    uniform float uWave3FreqX;
    uniform float uWave3FreqZ;
    uniform float uWave3Amp;
    uniform float uNoiseAmount;
    uniform float uFoldingOffset;
    uniform float uStepBase;
    uniform float uGlowIntensity;
    uniform float uGlowSpread;
    uniform float uWaveYOffset;

    float generateFineNoise(vec2 p) {
      vec3 p3 = fract(vec3(p.xyx) * 8.6231);
      p3 += dot(p3, p3.yzx + 67.92);
      return fract((p3.x + p3.y) * p3.z);
    }

    void main() {
      vec2 fragCoord = gl_FragCoord.xy;
      vec2 uv = (2.0 * fragCoord - iResolution.xy) / iResolution.y;
      vec3 rayDir = normalize(vec3(uv, 1.0));
      vec4 finalColor = vec4(0.0);
      float totalDistance = 0.0;
      float timeElapsed = iTime * uTimeScale;
      float pixelNoise = generateFineNoise(fragCoord) * uNoiseAmount;

      for (int i = 0; i < 38; i++) {
        vec3 currentPos = rayDir * totalDistance;
        currentPos.z -= 2.0;
        float wTime = timeElapsed * uWaveSpeed;
        float waveHeight = (
          sin(currentPos.x * uWave1Freq + wTime) * uWave1Amp +
          sin(currentPos.z * uWave2Freq - wTime * 0.6) * uWave2Amp +
          sin((currentPos.x * uWave3FreqX) - (currentPos.z * uWave3FreqZ) + (wTime * 1.6)) * uWave3Amp
        ) * uWaveHeight + uWaveYOffset;
        float distToWave = abs(currentPos.y - waveHeight);
        currentPos /= uFoldingOffset;
        float stepSize = min(distToWave - 0.080, pixelNoise) + uStepBase;
        totalDistance += stepSize;
        float patternX = sin(currentPos.x + cos(currentPos.y) * cos(currentPos.z));
        float patternY = sin(currentPos.z + sin(currentPos.y) * cos(currentPos.x + timeElapsed));
        float basePattern = smoothstep(0.5, 0.7, patternX * patternY);
        float blendFactor = 0.15 / (distToWave * distToWave + 0.01);
        float mixedPattern = mix(basePattern, 1.0, blendFactor);
        float glowIntensity = uGlowIntensity / (uGlowSpread + stepSize);
        float distanceFade = smoothstep(36.5, 7.3, totalDistance);
        vec3 paletteColor = 1.0 + cos(totalDistance * 3.0 + vec3(0.0, 1.0, 2.0));
        finalColor.rgb += glowIntensity * mixedPattern * distanceFade * paletteColor;
      }

      float dither = (generateFineNoise(fragCoord + vec2(12.34, 56.78)) - 0.5) / 128.0;
      finalColor.rgb += vec3(dither);
      finalColor.rgb = mix(finalColor.rgb, finalColor.rgb * vec3(0.42, 0.68, 1.32) + vec3(0.0, 0.028, 0.070), 0.58);
      gl_FragColor = vec4(finalColor.rgb, 1.0);
    }
  `;

  function ShaderCanvas({ opacity = 1, waveYOffset = 0, waveTransitionEase = 0.055 }) {
    const ref = useRef(null);
    const targetOffsetRef = useRef(waveYOffset);
    const transitionEaseRef = useRef(waveTransitionEase);
    useEffect(() => { targetOffsetRef.current = waveYOffset; }, [waveYOffset]);
    useEffect(() => { transitionEaseRef.current = waveTransitionEase; }, [waveTransitionEase]);
    useEffect(() => {
      const canvas = ref.current;
      const THREE_NS = window.THREE;
      if (!canvas || !THREE_NS) return;
      const settings = THREE_BACKGROUND_SETTINGS;
      const scene = new THREE_NS.Scene();
      const camera = new THREE_NS.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      const renderer = new THREE_NS.WebGLRenderer({ canvas, antialias:false });
      renderer.setPixelRatio(settings.dpr);
      const uniforms = {
        iTime: { value:0 },
        iResolution: { value:new THREE_NS.Vector3() },
        uTimeScale: { value:settings.timeScale },
        uWaveSpeed: { value:settings.waveSpeed },
        uWaveHeight: { value:settings.waveHeight },
        uWave1Freq: { value:settings.wave1Freq },
        uWave1Amp: { value:settings.wave1Amp },
        uWave2Freq: { value:settings.wave2Freq },
        uWave2Amp: { value:settings.wave2Amp },
        uWave3FreqX: { value:settings.wave3FreqX },
        uWave3FreqZ: { value:settings.wave3FreqZ },
        uWave3Amp: { value:settings.wave3Amp },
        uNoiseAmount: { value:settings.noiseAmount },
        uFoldingOffset: { value:settings.foldingOffset },
        uStepBase: { value:settings.stepBase },
        uGlowIntensity: { value:settings.glowIntensity },
        uGlowSpread: { value:settings.glowSpread },
        uWaveYOffset: { value:targetOffsetRef.current },
      };
      const material = new THREE_NS.ShaderMaterial({
        vertexShader:THREE_VERTEX_SHADER,
        fragmentShader:THREE_FRAGMENT_SHADER,
        uniforms,
      });
      const geometry = new THREE_NS.PlaneGeometry(2, 2);
      const mesh = new THREE_NS.Mesh(geometry, material);
      const clock = new THREE_NS.Clock();
      scene.add(mesh);
      const updateResolution = () => {
        const width = canvas.clientWidth || window.innerWidth;
        const height = canvas.clientHeight || window.innerHeight;
        renderer.setSize(width, height, false);
        const pixelRatio = renderer.getPixelRatio();
        uniforms.iResolution.value.set(width * pixelRatio, height * pixelRatio, 1);
      };
      let raf;
      const animate = () => {
        uniforms.iTime.value = clock.getElapsedTime();
        uniforms.uWaveYOffset.value += (targetOffsetRef.current - uniforms.uWaveYOffset.value) * transitionEaseRef.current;
        renderer.render(scene, camera);
        raf = requestAnimationFrame(animate);
      };
      updateResolution();
      window.addEventListener('resize', updateResolution);
      raf = requestAnimationFrame(animate);
      return () => {
        cancelAnimationFrame(raf);
        window.removeEventListener('resize', updateResolution);
        geometry.dispose();
        material.dispose();
        renderer.dispose();
      };
    }, []);
    return <canvas ref={ref} style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity, transition:'opacity 0.35s ease', pointerEvents:'none', animation:'shaderIn 1.8s cubic-bezier(.22,1,.36,1) both' }}/>;
  }

  const BAR_COUNT = 44;

  function MicButton({ onResult, onTranscriptChange, listening, setListening, voiceMode, setVoiceMode, autoStart = false, stayActiveAfterResult = true }) {
    const recRef        = useRef(null);
    const audioStreamRef = useRef(null);
    const audioContextRef = useRef(null);
    const analyserRef = useRef(null);
    const audioDataRef = useRef(null);
    const transcriptRef = useRef('');
    const cancelledRef  = useRef(false);
    const submittingRef = useRef(false);
    const startingRef   = useRef(false);
    const listeningRef  = useRef(listening);
    const voiceModeRef  = useRef(voiceMode);
    const autoStartRef  = useRef(autoStart);
    const prevVoiceModeRef = useRef(voiceMode);
    const restartTimerRef = useRef(null);
    const submitTimerRef = useRef(null);
    const rafRef        = useRef(null);
    const ampBuf        = useRef(new Array(BAR_COUNT).fill(0));
    const startTs       = useRef(0);
    const speakingRef   = useRef(false);   // piloté par onspeechstart/onspeechend
    const smoothRef     = useRef(0);       // niveau lissé courant
    const [amps, setAmps] = useState(() => new Array(BAR_COUNT).fill(0));

    const stopAnim = () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      rafRef.current = null;
    };

    const readAudioLevel = () => {
      const analyser = analyserRef.current;
      const data = audioDataRef.current;
      if (!analyser || !data) return null;
      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i += 1) {
        const value = (data[i] - 128) / 128;
        sum += value * value;
      }
      return Math.min(1, Math.sqrt(sum / data.length) * 7);
    };

    const startAnim = () => {
      if (rafRef.current) return;
      startTs.current = performance.now();
      ampBuf.current = new Array(BAR_COUNT).fill(0);
      smoothRef.current = 0;
      let last = 0;
      const tick = (ts) => {
        rafRef.current = requestAnimationFrame(tick);
        if (ts - last < 40) return;
        last = ts;
        const t = (ts - startTs.current) / 1000;
        const measuredLevel = readAudioLevel();
        const target = measuredLevel !== null
          ? Math.max(voiceModeRef.current && autoStartRef.current ? 0.16 : 0, measuredLevel)
          : speakingRef.current ? 0.85 : (voiceModeRef.current && autoStartRef.current ? 0.22 : 0.0);
        // lerp vers la cible — montée rapide, descente un peu plus douce
        const rate = speakingRef.current ? 0.22 : 0.08;
        smoothRef.current += (target - smoothRef.current) * rate;
        const level = smoothRef.current;
        // modulation naturelle multipliée par le niveau
        const mod = 1
          + Math.sin(t * 5.3)        * 0.28
          + Math.sin(t * 11.7 + 1.1) * 0.18
          + Math.sin(t * 23.1 + 0.6) * 0.10;
        const amp = Math.max(0, Math.min(1, level * mod));
        ampBuf.current = [...ampBuf.current.slice(1), amp];
        setAmps([...ampBuf.current]);
      };
      rafRef.current = requestAnimationFrame(tick);
    };

    const clearRestartTimer = () => {
      if (!restartTimerRef.current) return;
      clearTimeout(restartTimerRef.current);
      restartTimerRef.current = null;
    };
    const clearTranscript = () => { transcriptRef.current = ''; onTranscriptChange && onTranscriptChange(''); };

    const clearSubmitTimer = () => {
      if (!submitTimerRef.current) return;
      clearTimeout(submitTimerRef.current);
      submitTimerRef.current = null;
    };

    const scheduleRestart = (delay = 700) => {
      clearRestartTimer();
      if (!voiceModeRef.current || !autoStartRef.current || cancelledRef.current) return;
      restartTimerRef.current = setTimeout(() => {
        restartTimerRef.current = null;
        start();
      }, delay);
    };

    const submitTranscript = () => {
      const finalTranscript = transcriptRef.current.trim();
      if (!finalTranscript) return;
      submittingRef.current = true;
      clearRestartTimer();
      clearSubmitTimer();
      recRef.current?.stop();
      setListening(false);
      listeningRef.current = false;
      clearTranscript();
      if (!stayActiveAfterResult) {
        voiceModeRef.current = false;
        setVoiceMode?.(false);
        stopAnim();
        stopMicStream();
      }
      onResult(finalTranscript);
    };

    const scheduleSubmit = () => {
      clearSubmitTimer();
      submitTimerRef.current = setTimeout(submitTranscript, 850);
    };

    const setupAudioMeter = async () => {
      if (window.location.protocol === 'file:' || audioStreamRef.current?.active || !navigator.mediaDevices?.getUserMedia) return true;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioStreamRef.current = stream;
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          const ctx = new AudioCtx();
          const source = ctx.createMediaStreamSource(stream);
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 256;
          analyser.smoothingTimeConstant = 0.72;
          source.connect(analyser);
          audioContextRef.current = ctx;
          analyserRef.current = analyser;
          audioDataRef.current = new Uint8Array(analyser.frequencyBinCount);
        }
        return true;
      } catch (err) {
        return true;
      }
    };

    const ensureMicPermission = async () => {
      if (!navigator.permissions?.query) return setupAudioMeter();
      try {
        const status = await navigator.permissions.query({ name: 'microphone' });

  function ChatScreen({ step, answers, onAnswer, onEditStep, onCancel }) {
    const q = QUESTIONS[step];
    const tokens = useMemo(() => {
      const result = [];
      q.text.split('\n').forEach((line, li, arr) => {
        line.split(' ').filter(w=>w).forEach(w => result.push({ type:'word', text:w }));
        if (li < arr.length - 1) result.push({ type:'br' });
      });
      return result;
    }, [q.text]);
    const totalWords = tokens.filter(t=>t.type==='word').length;
    const [phase, setPhase]     = useState('writing');
    const [wordIdx, setWordIdx] = useState(0);
    const [chosen, setChosen]   = useState(null);
    const [inputVal, setInputVal] = useState('');
    const [listening, setListening] = useState(false);
    const [voiceMode, setVoiceMode] = useState(false);
    const [voiceTranscript, setVoiceTranscript] = useState('');
    const [chipsHidden, setChipsHidden] = useState(false);
    const chatInputRef = useRef(null);
    useEffect(() => { setPhase('writing'); setWordIdx(0); setChosen(null); setInputVal(''); setVoiceTranscript(''); setChipsHidden(false); }, [step]);
    useEffect(() => { if (voiceTranscript) setChipsHidden(true); }, [voiceTranscript]);
    useEffect(() => {
      if (phase !== 'writing') return;
      if (wordIdx >= totalWords) { const t = setTimeout(() => setPhase('rising'), 140); return () => clearTimeout(t); }
      const delay = wordIdx === 0 ? 250 : 85;
      const t = setTimeout(() => setWordIdx(i => i + 1), delay);
      return () => clearTimeout(t);
    }, [phase, wordIdx, totalWords]);
    useEffect(() => { if (phase !== 'rising') return; const t = setTimeout(() => setPhase('options'), 90); return () => clearTimeout(t); }, [phase]);
    useEffect(() => { if (phase !== 'chosen') return; const t = setTimeout(() => setPhase('exiting'), 320); return () => clearTimeout(t); }, [phase]);
    useEffect(() => { if (phase !== 'exiting') return; const t = setTimeout(() => onAnswer(chosen), 480); return () => clearTimeout(t); }, [phase, chosen, onAnswer]);

    const handleChose = (val) => { if (phase !== 'options') return; setChosen(val); setPhase('chosen'); };
    const handleText = (val) => { if(val.trim()) handleChose(val.trim()); };
    const questionUp      = phase === 'rising' || phase === 'options' || phase === 'chosen' || phase === 'exiting';
    const questionOpacity = phase === 'exiting' ? 0 : 1;
    const questionShift   = phase === 'exiting' ? '-40px' : '0px';
    let wCount = 0;
    const renderedText = tokens.map((tok, i) => {
      if (tok.type === 'br') return <br key={i}/>;
      const idx = wCount++;
      return <span key={i} style={{ display:'inline', opacity: idx < wordIdx ? 1 : 0, transition:'opacity 0.22s ease' }}>{tok.text}{' '}</span>;
    });

    return (
      <div style={{ flex:1, display:'flex', flexDirection:'column', position:'relative', zIndex:1 }}>
        <AppHeader
          onBack={step > 0 ? () => onEditStep(step - 1) : null}
          onHelp={undefined}
          rightAction={(
            <button onClick={onCancel} style={{ width:36, height:36, borderRadius:'50%', background:'rgba(255,255,255,0.08)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 4l8 8M12 4l-8 8" stroke="rgba(255,255,255,0.65)" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </button>
          )}
        />
        <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:6, padding:'0 0 14px', flexShrink:0 }}>
          {QUESTIONS.map((_,i) => (
            <div key={i} style={{ width:i===step?18:6, height:6, borderRadius:3, background:i===step?'rgba(255,255,255,0.55)':i<step?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.12)', transition:'all 0.35s cubic-bezier(.22,1,.36,1)' }}></div>
          ))}
        </div>
        <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
          <div key={step} style={{ position:'absolute', left:28, right:28, top:questionUp ? '12%' : '42%', transform:`translateY(${questionUp ? questionShift : '-50%'})`, opacity:questionOpacity, transition: phase === 'writing' ? 'none' : 'top 0.62s cubic-bezier(.22,1,.36,1), transform 0.48s ease, opacity 0.38s ease' }}>
            <h2 style={{ fontFamily:'Questrial, sans-serif', fontSize:34, color:'rgba(255,255,255,0.95)', fontWeight:400, lineHeight:1.22, letterSpacing:'-0.2px' }}>{renderedText}</h2>
          </div>
          {(phase === 'options' || phase === 'chosen') && (
            <div style={{ position:'absolute', bottom:14, left:24, right:24, opacity: chipsHidden ? 0 : 1, transform: chipsHidden ? 'translateY(-22px)' : 'translateY(0)', transition:'opacity 0.38s ease, transform 0.38s cubic-bezier(.22,1,.36,1)', pointerEvents: chipsHidden ? 'none' : 'auto' }}>
              <div style={{ display:'flex', flexWrap:'wrap', gap:10 }}>
                {q.options.map((opt, i) => {
                  const isSel = chosen === opt.l;
                  const isOther = chosen && !isSel;
                  return (

  function InsightScreen({ answers, insight, onContinue, onRestart, onBack, extraNote, setExtraNote, extraChips, setExtraChips }) {

      if (therapyId === 'act') return /ACT|acceptation|engagement/i.test(`${therapist.specialty} ${therapist.matchReason}`);
      if (therapyId === 'systemique') return /systémique|relations|famille/i.test(`${therapist.specialty} ${therapist.matchReason}`);

  // Mots-clés incontestables — déclenchement immédiat sans appel IA
  const CRISIS_KEYWORDS = [
    'me tuer','me suicider','mettre fin à ma vie','en finir avec ma vie',
    'me pendre','me jeter dans le vide','avaler des médicaments pour mourir',
    'me tirer une balle','mourir ce soir','mourir cette nuit','mourir aujourd\'hui',
    'go la mort','je veux mourir maintenant','j\'ai envie de mourir maintenant',
    'je vais mourir ce soir','je vais mourir cette nuit',
    'je vais me faire du mal','je vais me blesser',
    'pensées suicidaires','idées suicidaires',
  ];
  function hasCrisisKeyword(text) {
    const t = text.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    return CRISIS_KEYWORDS.some(function(kw){
      return t.includes(kw.normalize('NFD').replace(/[̀-ͯ]/g, ''));
    });
  }

  async function detectCrisis(text) {
    // Filet de sécurité synchrone — cas évidents sans latence réseau
    if (hasCrisisKeyword(text)) return true;
    // Analyse IA pour les cas ambigus
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${window.__GROQ_KEY}` },
        body: JSON.stringify({
          model:'llama-3.1-8b-instant',
          messages:[
            { role:'system', content:'Tu analyses si un message exprime une crise réelle et immédiate. Réponds uniquement avec {"crisis":true} ou {"crisis":false}.\n\nDéclenche {"crisis":true} si :\n- Pensées suicidaires actuelles ou intention de se blesser maintenant\n- Violence envers autrui avec une cible précise ET une temporalité concrète (ex: "je vais tuer Bernard ce soir")\n\nNe déclenche PAS pour :\n- Expressions de frustration sans cible+temps précis ("je vais le tuer", "je vais tuer ma tante")\n- Métaphores ("je veux mourir de honte", "je suis mort de rire")\n- Mentions au passé ou souffrance générale\n\nLa combinaison cible nommée + moment précis = intention sérieuse.' },
            { role:'user', content:text },
          ],
          max_tokens:10,
          temperature:0,
        }),
      });
      const data = await res.json();
      const raw = data.choices?.[0]?.message?.content || '';
      return raw.includes('"crisis":true') || raw.includes('"crisis": true');
    } catch(e) { return false; }
  }

  function BookingScreen({ therapist:th, onBack, onRestart, onConfirmBooking }) {
    const schedule = (() => {
      const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
      const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
      const timeSlots = [
        ['10h00','14h30','17h30'],['9h00','11h30','16h00'],['11h30','15h00'],
        ['13h30','18h00'],['9h30','12h00','16h30'],['10h30','15h30'],['11h00','14h00','18h00'],
      ];
      const result = [];
      const now = new Date();
      // Commence demain (les créneaux d'aujourd'hui sont passés)
      let d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      let slotIdx = 0;
      while (result.length < 7) {
        const dow = d.getDay();
        if (dow !== 0 && dow !== 6) { // Skip week-ends
          const id = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          const weekday = days[dow];
          const day = String(d.getDate());
          const month = months[d.getMonth()];
          result.push({ id, label:`${weekday} ${day} ${month}`, weekday, day, month, times: timeSlots[slotIdx % timeSlots.length] });
          slotIdx++;
        }
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
      }
      return result;
    })();
    const [selectedDay, setSelectedDay] = useState(schedule[0].id);
    const [selectedTime, setSelectedTime] = useState(null);
    const [done, setDone] = useState(false);
    const currentDay = schedule.find(day => day.id === selectedDay) || schedule[0];
    const sel = selectedTime ? `${currentDay.label} - ${selectedTime}` : null;
    useEffect(() => {
      setSelectedTime(null);
    }, [selectedDay]);
    const handleAddToCalendar = () => {
      if (!sel) return;
      const datePart = selectedDay.replace(/-/g, '');
      const [hour, minute] = selectedTime.split('h');
      const startDate = new Date(`${selectedDay}T${hour.padStart(2,'0')}:${minute.padStart(2,'0')}:00`);
      const endDate = new Date(startDate.getTime() + 45 * 60 * 1000);
      const toICS = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const h = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        return `${y}${m}${d}T${h}${min}00`;
      };
      const start = toICS(startDate);
      const end = toICS(endDate);
      const ics = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Claira//RDV//FR",
        "BEGIN:VEVENT",
        `UID:claira-${th.id}-${datePart}-${hour}${minute}`,
        `DTSTAMP:${start}Z`,
        `DTSTART:${start}`,
        `DTEND:${end}`,
        `SUMMARY:Rendez-vous avec ${th.name}`,
        `DESCRIPTION:Consultation réservée via Claira avec ${th.name}.`,
        "LOCATION:Cabinet / en ligne",
        "END:VEVENT",
        "END:VCALENDAR",
      ].join("\r\n");
      const blob = new Blob([ics], { type:'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `rendez-vous-${th.name.toLowerCase().replace(/\s+/g,'-')}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    };
    if (done) return (<div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', padding:'40px 32px', textAlign:'center', position:'relative', zIndex:1 }}><div className="fade-up" style={{ width:68, height:68, borderRadius:'50%', background:'rgba(100,200,150,0.12)', border:'1px solid rgba(100,200,150,0.25)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:22 }}><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M6 14.5l5 5L22 9" stroke="rgba(100,200,150,0.9)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg></div><h2 className="fade-up" style={{ fontFamily:'Questrial, sans-serif', fontSize:31, color:'rgba(255,255,255,0.92)', fontWeight:700, marginBottom:10, animationDelay:'0.1s', letterSpacing:'-0.02em' }}>C&apos;est confirmé !</h2><p className="fade-up" style={{ fontSize:15, color:'rgba(255,255,255,0.52)', lineHeight:1.65, marginBottom:6, animationDelay:'0.18s', fontFamily:'Questrial, sans-serif' }}>avec {th.name}</p><p className="fade-up" style={{ fontSize:15, color:'rgba(116,227,234,0.92)', fontWeight:700, marginBottom:22, animationDelay:'0.22s', fontFamily:'Questrial, sans-serif' }}>{sel}</p><div className="fade-up" style={{ background:'rgba(255,255,255,0.05)', borderRadius:14, padding:'16px 18px', marginBottom:14, width:'100%', border:'1px solid rgba(255,255,255,0.08)', animationDelay:'0.3s' }}><p style={{ fontSize:14, color:'rgba(255,255,255,0.72)', lineHeight:1.75, margin:0, fontFamily:'Questrial, sans-serif' }}>Un email de confirmation vous a été envoyé. Annulation possible jusqu&apos;à 24h avant.</p></div><button onClick={handleAddToCalendar} className="fade-up" style={{ minHeight:58, width:'100%', background:'rgba(255,255,255,0.92)', border:'1px solid rgba(255,255,255,0.16)', borderRadius:100, padding:'15px 22px', fontSize:16, color:'#0b0b14', fontWeight:700, fontFamily:'Questrial, sans-serif', cursor:'pointer', animationDelay:'0.34s', letterSpacing:'0.01em', marginBottom:12 }}>Ajouter à mon calendrier</button><button onClick={onRestart} className="fade-up" style={{ minHeight:58, width:'100%', background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.10)', borderRadius:100, padding:'15px 22px', fontSize:16, color:'rgba(255,255,255,0.80)', fontWeight:600, fontFamily:'Questrial, sans-serif', cursor:'pointer', animationDelay:'0.38s', letterSpacing:'0.02em' }}>Retour à l&apos;accueil</button></div>);
    return (
      <div style={{ flex:1, display:'flex', flexDirection:'column', position:'relative', zIndex:1, overflowY:'hidden', overflowX:'visible' }}>
        <AppHeader onBack={onBack} title="Rendez-vous" />
        <div style={{ padding:'8px 24px 14px', flexShrink:0 }}>
          <div>
            <h2 style={{ fontFamily:'Questrial, sans-serif', fontSize:22, color:'rgba(255,255,255,0.90)', fontWeight:700, letterSpacing:'-0.02em' }}>Choisir un créneau</h2>
            <p style={{ fontSize:14, color:'rgba(255,255,255,0.62)', marginTop:3, fontFamily:'Questrial, sans-serif', fontWeight:400 }}>avec {th.name}</p>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:'0 24px', display:'flex', flexDirection:'column' }}>
          <div style={{ display:'flex', gap:10, overflowX:'auto', paddingBottom:16, paddingRight:48, marginBottom:6, WebkitOverflowScrolling:'touch', scrollbarWidth:'none', msOverflowStyle:'none' }}>
            {schedule.map((day) => {
              const isActive = day.id === selectedDay;
              return (
                <button
                  key={day.id}
                  onClick={() => setSelectedDay(day.id)}
                  style={{
                    minWidth:84,
                    minHeight:78,
                    padding:'12px 12px 10px',
                    borderRadius:20,
                    border:`1px solid ${isActive ? 'rgba(116,227,234,0.28)' : 'rgba(255,255,255,0.08)'}`,
                    background:isActive ? 'rgba(116,227,234,0.12)' : 'rgba(255,255,255,0.05)',
                    color:isActive ? 'rgba(255,255,255,0.94)' : 'rgba(255,255,255,0.68)',
                    display:'flex',
                    flexDirection:'column',
                    alignItems:'flex-start',
                    justifyContent:'space-between',
                    textAlign:'left',
                    fontFamily:'Questrial, sans-serif',
                    cursor:'pointer',
                    flexShrink:0,
                  }}
                >
                  <span style={{ fontSize:13, fontWeight:700 }}>{day.weekday}</span>
                  <span style={{ fontSize:28, lineHeight:1, fontWeight:700, color:isActive ? 'rgba(116,227,234,0.95)' : 'rgba(255,255,255,0.90)' }}>{day.day}</span>
                  <span style={{ fontSize:12, color:isActive ? 'rgba(255,255,255,0.72)' : 'rgba(255,255,255,0.46)' }}>{day.month}</span>
                </button>
              );
            })}
          </div>
          <div style={{ fontSize:14, color:'rgba(255,255,255,0.62)', fontFamily:'Questrial, sans-serif', fontWeight:600, marginBottom:10 }}>Créneaux disponibles</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8, paddingBottom:20 }}>
            {currentDay.times.map((time,i)=>(
              <button
                key={i}
                onClick={()=>setSelectedTime(time)}
                style={{
                  minHeight:56,
                  padding:'14px 18px',
                  background:selectedTime===time?'rgba(255,255,255,0.12)':'rgba(255,255,255,0.05)',
                  border:`1px solid ${selectedTime===time?'rgba(255,255,255,0.16)':'rgba(255,255,255,0.08)'}`,
                  borderRadius:18,
                  fontSize:15,
                  fontWeight:600,
                  color:selectedTime===time?'rgba(255,255,255,0.92)':'rgba(255,255,255,0.72)',
                  fontFamily:'Questrial, sans-serif',
                  cursor:'pointer',
                  textAlign:'left',
                  transition:'all 0.2s',
                  display:'flex',
                  alignItems:'center',
                  justifyContent:'space-between',
                }}
              >
                <span>{currentDay.label} - {time}</span>
                <span style={{ fontSize:12, color:selectedTime===time?'rgba(116,227,234,0.92)':'rgba(255,255,255,0.42)' }}>45 min</span>
              </button>
            ))}
          </div>
        </div>
        <div style={{ padding:'16px 24px 32px', flexShrink:0 }}>
          <button onClick={()=>{ if(!sel) return; onConfirmBooking && onConfirmBooking({ therapistId:th.id, name:th.name, when:sel, type: th.online ? 'video' : 'cabinet', initials:th.initials, hue:th.hue }); setDone(true); }} style={{ width:'100%', minHeight:64, padding:'17px 24px', background:sel?'rgba(255,255,255,0.92)':'rgba(255,255,255,0.07)', color:sel?'#0b0b14':'rgba(255,255,255,0.40)', border:'1px solid rgba(255,255,255,0.10)', borderRadius:100, fontSize:17, fontWeight:600, fontFamily:'Questrial, sans-serif', cursor:sel?'pointer':'default', transition:'all 0.3s', letterSpacing:'0.02em' }}>Confirmer le rendez-vous</button>
        </div>
      </div>
    );
  }

    const past     = appointments.filter(function(a){ return a.status === 'past'; });

    const typeConfig = {
      video: {
        label:'Visio', color:'rgba(116,227,234,0.92)', bg:'rgba(116,227,234,0.10)', border:'rgba(116,227,234,0.22)',
        icon:(<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="13" height="11" rx="2.5" stroke="currentColor" strokeWidth="1.8"/><path d="M15 10.5l5.5-3v9l-5.5-3" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>),
        action:'Tester la visio',
      },
      cabinet: {

        action:"Voir l'adresse",
      },

    return (
      <div style={{ flex:1, display:'flex', flexDirection:'column', position:'relative', zIndex:1, overflowY:'hidden' }}>

        <div style={{ padding:'0 24px 16px', flexShrink:0 }}>
          <div style={{ display:'flex', background:'rgba(255,255,255,0.06)', borderRadius:100, padding:3 }}>
            {[['upcoming', upcoming.length ? `À venir (${upcoming.length})` : 'À venir'], ['past','Passés']].map(function(item){

(() => {

haderForInnerPage(); setScreen('therapy-questions'); }} bottomInset={showTabbar ? 94 : 0} onDetailStateChange={setTherapyDetailOpen} />}{screen === 'therapy-questions' && <TherapyQuestionsScreen onBack={()=>setScreen('therapies')} onSOS={()=>setSosOpen(true)} />}{screen === 'matching' && <MatchingScreen insight={recommendationInsight} titleOverride={mainTab === 'booking' ? 'Prendre un RDV' : undefined} onSelect={t=>{setShaderForInnerPage();setTh(t);setScreen('therapist');setHasViewedTherapist(true);setTherapistFromScreen('matching');}} onBack={recommendationInsight && mainTab !== 'booking' ? ()=>setScreen('therapies') : undefined} bottomInset={showTabbar ? 94 : 0} />}{screen === 'appointments' && <AppointmentsScreen appointments={appointments} onGoMatching={goToBookingHub} onBookTherapist={function(t){ setShaderForInnerPage(); setTh(t); setMainTab('booking'); setScreen('booking'); setTherapistFromScreen('appointments'); }} onViewTherapist={handleViewTherapistFromAppt} bottomInset={showTabbar ? 94 : 0} />}{screen === 'therapist' && therapist && <TherapistScreen therapist={therapist} onBook={()=>{ setShaderForInnerPage(); setScreen('booking'); }} onBack={()=>{ setShaderForInnerPage(); setMainTab('booking'); setScreen(therapistFromScreen === 'appointments' ? 'appointments' : 'matching'); }} />}{screen === 'booking' && therapist && <BookingScreen therapist={therapist} onBack={()=>setScreen('therapist')} onRestart={goToHub} onConfirmBooking={addAppointment} />}</div>{showTabbar && <MainTabBar active={mainTab} onHome={goToHub} onTherapies={goToTherapies} onBooking={goToAppointments} onSOS={() => setSosOpen(true)} />}
